<link rel="stylesheet" href="/gun/kit/web.css"><script src="/gun/kit/web.js"></script>
<div id="container" class="cat-box">
  <div class="header">
    <span class="dot red"></span>
    <span class="dot yellow"></span>
    <span class="dot green"></span>
    <span id="filename" class="title">FILE VIEWER</span>
  </div>
  <pre id="content" class="file-content"></pre>
</div>
<style>
.cat-box {
  background: rgba(10, 10, 15, 0.95);
  border: 2px solid #00ffea;
  border-radius: 12px;
  margin: 1em 0;
  box-shadow: 0 0 20px rgba(0, 255, 234, 0.2);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.header {
  background: rgba(0, 255, 234, 0.1);
  border-bottom: 2px solid #00ffea;
  padding: 0.8em;
  display: flex; align-items: center;
}
.dot { width: 15px; height: 15px; border-radius: 50%; margin-right: 8px; }
.red { background: #ff4757; }
.yellow { background: #ffa502; }
.green { background: #2ed573; }
.title { margin-left: auto; margin-right: auto; font-family: monospace; font-weight: bold; color: #00ffea; text-shadow: 0 0 5px #00ffea; letter-spacing: 2px; }
.file-content {
  margin: 0; padding: 1.5em;
  font-family: 'Courier New', Courier, monospace;
  font-size: 1.1em;
  color: #e0e0e0;
  overflow-x: auto;
  max-height: 60vh;
  overflow-y: auto;
  white-space: pre-wrap;
  word-wrap: break-word;
  scrollbar-width: thin;
  scrollbar-color: #00ffea transparent;
}
.file-content::-webkit-scrollbar { width: 8px; height: 8px; }
.file-content::-webkit-scrollbar-thumb { background: #00ffea; border-radius: 4px; }
</style>
<script src="../util.js"></script>
<script>
console.off = 1;
kit.ear('cat', function hear(eve) {
  var s = eve.detail || eve.data || "";
  var raw = s.flat();
  var lines = raw.split('\n');
  var cmdLine = lines[0].trim();
  
  var fnameMatch = cmdLine.match(/^cat\s+(.+)/);
  if (fnameMatch) filename.innerText = fnameMatch[1].toUpperCase();
  
  var text = lines.slice(1).join('\n');
  // Trim trailing prompts if they leaked
  text = text.replace(/[
]+.*(?:\$|#|>)\s*$/, '');
  
  content.textContent = text;
  hear.off();
});
</script>
