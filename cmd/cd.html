<link rel="stylesheet" href="../gun/kit/web.css"><script src="../gun/kit/web.js"></script>
<div id="container" class="cmd-box">

  <div id="content" class="text"></div>
</div>
<style>
.cmd-box {
  
}
.cmd-box:active {  }
.cmd-box:active .text { }
.icon {  }
.text { }
.error { border-color: #ff0055; box-shadow: 0 0 15px #ff0055, inset 0 0 10px rgba(255, 0, 85, 0.5); }
.error .icon { filter: drop-shadow(0 0 10px #ff0055); }
.error .text { color: #ff0055; text-shadow: 0 0 8px #ff0055; }
</style>
<script src="../util.js"></script>
<script>
console.off = 1;
kit.ear('cd', function hear(eve) {
  var s = eve.detail || eve.data || "";
  var lines = s.flat().trim().split('\n');
  var text = lines.slice(1).join('\n').trim(); // Ignore the echoed command line usually at [0]
  if (!text) text = lines[0].trim().replace(/^cd\s+/,'') || "MOVED";
  
  if (text.toLowerCase().includes('no such file') || text.toLowerCase().includes('not a directory')) {
    container.classList.add('error');
    container.querySelector('.icon').innerText = '🚫';
  } else {
    // If it's a silent success, just show the folder name we cd'd into
    if (!text || text === "MOVED") {
      var match = lines[0].match(/cd\s+(.+)/);
      text = match ? match[1].trim() : "DIRECTORY CHANGED";
    }
  }
  content.innerText = text;
  


  hear.off();
});
</script>
