<link rel="stylesheet" href="../gun/kit/web.css"><script src="../gun/kit/web.js"></script>

<div id="list" class="ls">

</div>

<dialog id="actionDialog" class="fog sap lip ls-action-dialog">
  <p style="margin-top: 0; font-weight: bold;">Action on <span id="dialogTargetFile"></span>:</p>
  <div class="ls-action-grid">
    <button id="btnCat" style="background: transparent; color: inherit; border: 1px solid var(--pop, lime); padding: 0.5em; border-radius: 0.5em; cursor: pointer; text-align: left;">📄 cat</button>
    <button id="btnCp" style="background: transparent; color: inherit; border: 1px solid var(--pop, lime); padding: 0.5em; border-radius: 0.5em; cursor: pointer; text-align: left;">📋 cp</button>
    <button id="btnMv" style="background: transparent; color: inherit; border: 1px solid var(--pop, lime); padding: 0.5em; border-radius: 0.5em; cursor: pointer; text-align: left;">🚚 mv</button>
    <button id="btnRm" style="background: transparent; color: inherit; border: 1px solid red; padding: 0.5em; border-radius: 0.5em; cursor: pointer; text-align: left; color: red;">🗑️ rm</button>
    <button class="ls-action-cancel" onclick="actionDialog.close()" style="background: var(--pop, lime); color: var(--mood, #000); border: none; padding: 0.5em; border-radius: 0.5em; cursor: pointer; font-weight: bold; text-align: center;">Cancel</button>
    <div class="ls-action-clear"></div>
  </div>
</dialog>

<style>
.ls { 
  width: 100%; 
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 10px;
display: block;
  float: left;
  column-width: 6em;

  
}
  /* Global box-sizing fix */

*, *::before, *::after {

  box-sizing: border-box;

}
.ls a {
display: block;
  float: left;
  margin: 0.1em; width: 100%;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-h-eight: 1em;
  padding: 1em 0.5em;
  text-align: center;
  background: linear-gradient(135deg, rgba(191, 0, 255, 0.1), rgba(0,0,0,0.6));
  border: 2px solid var(--pop);
  border-radius: 16px;
  backdrop-filter: blur(var(--blur));
  
  font-family: 'Courier New', monospace;
  font-weight: 900;
  text-shadow: 0 0 5px var(--pop);
  box-shadow: 0 5px 15px rgba(191, 0, 255, 0.2), inset 0 0 10px rgba(191, 0, 255, 0.1);
  transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: pointer;
  word-break: break-word;
  user-select: none;
}
.ls a:active {
  background: var(--pop);
  color: var(--mood);
  transform: scale(0.92);
  text-shadow: none;
  box-shadow: 0 0 30px var(--pop);
}
.icon {
  font-size: 2.8em;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 10px var(--pop));
}
.folder-icon { color: #f1c40f; filter: drop-shadow(0 0 10px rgba(241,196,15,0.8)); text-shadow: none; }
.file-icon { color: #00ffc8; filter: drop-shadow(0 0 10px rgba(0,255,200,0.8)); text-shadow: none; }
  .file, .agh { border-color: white; background: pink; } 
.header-cmd {
display: block; width: 100%;
  color: var(--pop);
  font-weight: 900;
  font-size: 1.2em;
  margin-bottom: 10px;
  font-family: 'Courier New', monospace;
  border-bottom: 2px dashed var(--pop);
  padding-bottom: 5px;
  text-shadow: 0 0 8px var(--pop);
}
.ls-action-dialog {
  background: var(--mood, #000);
  color: var(--pop, lime);
  border: 1px solid var(--pop, lime);
  border-radius: 0 0 1em 1em;
  padding: 1.25em;
  z-index: 1000;
  font-family: monospace;
  position: fixed;
  margin: 0;
  inset: auto 0 auto 0;
  width: 100vw;
  max-width: 100vw;
}
.ls-action-dialog::backdrop {
  background: transparent;
}
.ls-action-grid {
  display: block;
  margin-top: 1em;
  width: 100%;
}
.ls-action-grid button {
  display: block;
  float: left;
  wi-dth: 24%;
  margin: 0 1% 0.5em 0;
  min-width: 0;
}
.ls-action-cancel {
  width: 5em;
  clear: both;
}
.ls-action-clear {
  clear: both;
}
</style>
<script src="../util.js"></script>
<script>


kit.ear('ls',function hear(eve){

  CMD.ls(eve.detail || eve.data, list);
  hear.off();
});
  
kit.say(['ls','ls .'], 'belt');
kit.say(['git','git status'], 'belt');
kit.say(['Gemini','gemini --help'], 'belt');

  
CMD = {};
CMD.ls = function(s,v,f,cmd){ 
  v.tag('ls',+1).innerHTML = '';
  cmd = (s=s.flat()).cut('\n',ESC); s = cmd[2]; cmd = cmd[0];
  


  f = (s.indexOf('\t')+1)? '\t' : /\s+/;
  s = s.replaceAll('\r\n','\t').replaceAll('\r','\t').replaceAll('\n','\t').replaceAll(/\s{2,}/g,'\t');
  
  var isBack = B.new('a');
  isBack.innerHTML = '..';
  isBack.dataset.val = '..';
  v.append(isBack);

  (s = s.split(f)).forEach((item,a)=>{
    if(!(item = item.flat().trim())){ return }
    if(item === '..') return;
    
    (a = B.new('a')).dataset.val = item;
    
    // Simple heuristic for file vs folder: folders usually don't have extensions, files do.
    // Also hidden files start with .
    var isFile = (item.includes('.') && item !== '.' && item !== '..');
    fold = '' ;
    if(!isFile) { fold = '/' } 
    // For pure UI, let's just make it look cool based on this guess
    
    a.dataset.kind = isFile? 'file' : 'folder';
    a.innerHTML = item + fold;
    v.append(a);
  });
  
  CMD.ls.on = CMD.ls.on || (function(){ 
    var longPressTimer;

    B.ear('pointerdown',(eve, el)=>{ el = eve.target;
      var a = el.closest('a');
      if(!a) return;
      if(!a.closest('.ls')) return;
      
      var val = a.dataset.val;
      if(val === '..') return; // Don't long press '..'

      longPressTimer = setTimeout(function() {
          eve.preventDefault();
          eve.stopPropagation();
          showActionDialog(a, val);
      }, 500); // 500ms long press

    });

    B.ear('pointerup',(eve, el)=>{
      clearTimeout(longPressTimer);
    });

    B.ear('pointermove',(eve, el)=>{
      clearTimeout(longPressTimer);
    });
    
    B.ear('contextmenu', (eve, el) => {
      el = eve.target;
      var a = el.closest('a');
      if(!a) return;
      if(!a.closest('.ls')) return;
      
      var val = a.dataset.val;
      if(val === '..') return;

      eve.preventDefault();
      clearTimeout(longPressTimer);
      showActionDialog(a, val);
    });

    B.ear('click',(eve, el)=>{ el = eve.target;
      var a = el.closest('a');
      if(!a) return;
      if(!a.closest('.ls')) return;
      
      var val = a.dataset.val;
      // If dialog is open, ignore normal clicks
	      if(actionDialog.open) {
	          eve.preventDefault();
	          return;
	      }
	      
	      if(val.includes('.') && val !== '..') {
	        kit.say('', 'prompt');
	        kit.say('cat ' + quoteArg(val), 'prompt');
	      } else {
	        kit.say('', 'prompt');
	        if(val === '..') {
	          kit.say('cd ..', 'prompt');
	          kit.say('ls .', 'prompt');
	        } else {
	          kit.say('cd ' + quoteArg(val), 'prompt');
	          kit.say('ls .', 'prompt');
	        }
	      }
	    })

    function quoteArg(val) {
        return '"' + String(val).replace(/(["\\$`])/g, '\\$1') + '"';
    }

    function placeActionDialog(anchor) {
        var rect = anchor.getBoundingClientRect();
        var top = Math.min(rect.bottom, window.innerHeight - 40);
        actionDialog.style.left = '0px';
        actionDialog.style.right = '0px';
        actionDialog.style.width = window.innerWidth + 'px';
        actionDialog.style.maxWidth = window.innerWidth + 'px';
        actionDialog.style.top = top + 'px';
        actionDialog.style.bottom = 'auto';
        actionDialog.style.maxHeight = Math.max(120, window.innerHeight - top) + 'px';
    }

    function showActionDialog(anchor, val) {
        var kind = anchor.dataset.kind || 'file';
        var q = quoteArg(val);
        dialogTargetFile.innerText = val + (kind === 'folder' ? '/' : '');
        placeActionDialog(anchor);
        
        btnCat.onclick = function() {
            if(kind === 'folder') {
                kit.say('cd ' + q, 'prompt');
              kit.say('ls .', 'prompt');
            } else {
                kit.say('cat ' + q, 'prompt');
            }
            actionDialog.close();
        };
        btnCp.onclick = function() {
            var dst = prompt('Copy to where?', val);
            if(dst) {
              kit.say('cp ' + q + ' ' + quoteArg(dst), 'prompt');
            }
            actionDialog.close();
        };
        btnMv.onclick = function() {
            var dst = prompt('Move to where?', val);
            if(dst) {
              kit.say('mv ' + q + ' ' + quoteArg(dst), 'prompt');
            }
            actionDialog.close();
        };
        btnRm.onclick = function() {
            kit.say((kind === 'folder' ? 'rm -r ' : 'rm ') + q, 'prompt');
            actionDialog.close();
        };

        if(actionDialog.open) {
          actionDialog.close();
        }
        actionDialog.show();
    }

    B.ear('pointerdown', function(eve){
      if(!actionDialog.open) { return }
      if(eve.target.closest('#actionDialog')) { return }
      actionDialog.close();
    });

    
  }())||1;
}
</script>
