kit.ear('prompt',(eve)=>{
  var cmd = eve.detail||eve.data;

  var val = prompt.value.trim();
  if(val && history[history.length-1] !== val) { history.push(val); }
  histIndex = history.length;
  kit.say(prompt.value+'\r','host');
  prompt.value = "";
  autoGrow(prompt);
});
kit.ear('prompt.try',(eve)=>{
  prompt.value = eve.detail||eve.data;
  //prompt.focus(); prompt.select();
});
prompt.onkeydown = function(eve){
  if(eve.key === 'ArrowUp') {
    if(histIndex > 0) { histIndex--; prompt.value = history[histIndex]; }
    eve.preventDefault();
  } else if (eve.key === 'ArrowDown') {
    if(histIndex < history.length - 1) { histIndex++; prompt.value = history[histIndex]; }
    else { histIndex = history.length; prompt.value = ''; }
    eve.preventDefault();
  } else if (eve.key === 'Enter' && !eve.shiftKey) {
    eve.preventDefault();
    kit.say('', 'prompt');
  }
};

const autoGrow = (textarea) => {
  textarea.style.height = 'auto';
  textarea.style.height = (textarea.scrollHeight) + 'px';
  // Fix for mobile browser URL bar hiding the prompt
  setTimeout(() => {
    window.scrollTo(0, document.body.scrollHeight);
  }, 100);
};

});

;(function(){
var F = ['$','#','>','C:\\>','PS>','>>>','...','(venv)','>>'];
stream.eat = function(s){
  var f = s.cut(F,ESC);
  if(!f[1]){ setTimeout(t=>{if(F.forEach){shell.append("cannot find prompt. custom shell being used?")}}); return }
  F = f[1];
  f = f[0].split('\r\n').slice(-1)[0]; // make more unique?
  F = f+F;
  //console.log("prompt:", [F]);
  (stream.eat = CMD.bash)(s);
}
CMD.bash = function(S, cmdl, cmd, tmp){
  var arr = S.split(F);
  if(arr[arr.length-1].flat().trim()){ 
    var P = ['$','#','>','C:\\>','PS>','>>>','...','(venv)','>>'];
    if(P.some(c => S.flat().replace(/\s+$/, '').endsWith(c))){
      var lines = S.split('\n'), lastL = lines[lines.length-1];
      var newF = lastL.cut(P, ESC);
      if(newF[1]){
        var nextF = newF[0].split('\r').slice(-1)[0] + newF[1];
        S = S.split(F).join(nextF);
        F = nextF;
        arr = S.split(F);
      } else return;
    } else return;
  }
  S = arr;
  stream.last = '';
  var atBottom = (B.scrollHeight - B.scrollTop - B.clientHeight < 50) && (shell.scrollHeight - shell.scrollTop - shell.clientHeight < 50);
  S.forEach(function(s,v,t,p){ if(!(t = s.flat()).trim()){ return }
    (p = B.new('p')).append(t); (v = B.new('div')).append(p); shell.append(v);
    cmd = t.cut(['\r\n','\n','\r'],ESC)[0]; // 1st line
    //console.log(s, [cmd], CMD[cmd], Object.keys(CMD));
    cmd = cmd.trim().split(/\s+/)[0].trim(); // 1st word
    var i = B.new('iframe');
    i.src = './cmd/'+cmd+'.html';
    v.append(i);
    kit.ear('load', function(eve){
      if(eve.detail === undefined) return; // Ignore native iframe load (e.g. 404)
      if(eve.target !== i) return;
      kit.say(s,cmd, i.contentWindow);
      var p = v.all('p')[0];
      if(p) p.remove();
    }, i);
    //(tmp = CMD[cmd]) && tmp(s,v);
  });
  if(atBottom) { B.scrollTop = B.scrollHeight; shell.scrollTop = shell.scrollHeight; }
}
}());

  }
}
